services:
  - type: web
    name: from-k-car
    env: node
    plan: starter
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
